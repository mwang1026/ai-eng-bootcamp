services:
  - type: web
    runtime: python
    name: ai-eng-bootcamp
    rootDir: week1
    branch: main
    plan: free
    buildCommand: uv sync --frozen && uv cache prune --ci
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: "3.12"
